name = "Negation Deep Dive"
description = "Thorough analysis of negation handling across multiple providers"

providers = ["exa", "tavily"]
exa_modes = ["auto"]

categories = ["negation", "antonym_confusion"]
queries_per_category = 10
difficulty = "hard"

run_geometry = true
run_perturbation = true
run_validation = false
run_evolution = true

geometry_models = ["all-MiniLM-L6-v2"]

perturbation_operators = ["word_delete", "word_swap", "synonym_replace"]
perturbation_variants = 5

evolution_generations = 10
evolution_population = 20
evolution_fitness_mode = "embedding_sim"
evolution_budget = 3.0

judge_model = "claude-sonnet-4-6"
num_results = 10
budget_limit = 10.0
max_concurrent = 5
